# ─── SparkCode Studio · production-ish compose ──────────────────────
# Single full-stack service pinned to the Aliyun ACR image. App reads
# DATABASE_URL from .env (your cloud Postgres at 104.194.91.23:5444 by
# default). To swap to a local PG container, uncomment the `db` service
# block at the bottom and set DATABASE_URL=postgres://sparkcode:sparkcode@db:5432/sparkcode_studio
#
# Usage:
#   docker compose pull               # fetch the latest published image
#   docker compose up -d              # run in background
#   docker compose up -d --build      # rebuild from local Dockerfile instead
#   docker compose logs -f app        # follow logs
#   docker compose down               # stop & remove

services:
  app:
    image: registry.cn-shanghai.aliyuncs.com/hxh_ai/sparkcode-studio:latest
    # Local build is still possible for development — `docker compose build`
    # tags the image with the same name above so `up` will pick it up.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sparkcode-studio
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    healthcheck:
      # Node-based healthcheck so we don't need wget/curl in the image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Uncomment if you also enable the local `db` service below
    # depends_on:
    #   db:
    #     condition: service_healthy
    # networks:
    #   - sparkcode-net

  # ─── Optional local Postgres (for offline dev / disconnected demos) ─
  # Uncomment this block and the depends_on / networks bits above if you
  # don't want to depend on the cloud Postgres. Don't forget to update
  # DATABASE_URL in .env:
  #   DATABASE_URL=postgres://sparkcode:sparkcode@db:5432/sparkcode_studio
  #
  # db:
  #   image: postgres:16-alpine
  #   container_name: sparkcode-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: sparkcode
  #     POSTGRES_PASSWORD: sparkcode
  #     POSTGRES_DB: sparkcode_studio
  #   ports:
  #     - "5432:5432"
